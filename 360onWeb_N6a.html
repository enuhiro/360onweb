<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>360onWeb Mobile Enhanced</title>
    <style>
        :root {
            --primary: #4CAF50;
            --bg: #1a1a1a;
            --card: #2d2d2d;
            --text: #ffffff;
        }
        body {
            font-family: sans-serif;
            margin: 0; padding: 0;
            background: var(--bg); color: var(--text);
            overflow-x: hidden;
            touch-action: manipulation;
        }
        .container { padding: 10px; max-width: 800px; margin: 0 auto; }
        
        /* 操作パネルを指で押しやすく */
        .upload-area {
            border: 2px dashed var(--primary);
            padding: 20px; text-align: center;
            border-radius: 12px; margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
        }
        .canvas-wrapper {
            position: relative; width: 100%; aspect-ratio: 1/1;
            background: #000; border-radius: 8px; overflow: hidden;
            margin-bottom: 10px;
        }
        canvas { width: 100%; height: 100%; touch-action: none; cursor: grab; }
        
        .controls-grid {
            display: grid; grid-template-columns: 1fr; gap: 12px;
            background: var(--card); padding: 15px; border-radius: 12px;
        }
        .control-item { margin-bottom: 5px; }
        .label-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        
        input[type="range"] {
            width: 100%; height: 30px; /* タップしやすく厚く */
            accent-color: var(--primary);
        }
        
        .btn-row { display: flex; gap: 8px; margin-top: 10px; }
        button {
            flex: 1; padding: 12px; border: none; border-radius: 8px;
            background: var(--primary); color: white; font-weight: bold;
            font-size: 14px; cursor: pointer;
        }
        .btn-secondary { background: #444; }
        
        /* スマホで隠れがちな「戻る」ボタンを大きく */
        .history-btns { display: flex; gap: 5px; margin-bottom: 10px; }
        .history-btns button { padding: 8px; font-size: 12px; }

        #loadingOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div style="border: 4px solid #fff; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animate: spin 1s linear infinite;"></div>
    <p>処理中...</p>
</div>

<div class="container">
    <div class="upload-area" id="dropZone">
        <button onclick="document.getElementById('fileInput').click()">🖼️ 画像を選択</button>
        <input type="file" id="fileInput" hidden accept="image/*">
        <p style="font-size: 12px; margin-top: 10px;">または画像をここにドロップ</p>
    </div>

    <div id="editor" style="display:none;">
        <div class="history-btns">
            <button class="btn-secondary" id="undoBtn" onclick="undoState()">↩ 戻る</button>
            <button class="btn-secondary" id="redoBtn" onclick="redoState()">↪ 進む</button>
            <button class="btn-secondary" onclick="resetControls()">クリア</button>
        </div>

        <div class="canvas-wrapper">
            <canvas id="mainCanvas"></canvas>
        </div>

        <div class="controls-grid">
            <div class="control-item">
                <div class="label-row"><span>🔍 ズーム</span><span id="v_scale">4.00</span></div>
                <input type="range" id="s_scale" min="0.5" max="9.5" step="0.01" value="4.0">
            </div>
            <div class="control-item">
                <div class="label-row"><span>🔄 回転</span><span id="v_yaw">0°</span></div>
                <input type="range" id="s_yaw" min="-180" max="180" step="1" value="0">
            </div>
            <div class="control-item">
                <div class="label-row"><span>🌀 竜巻 (Twister)</span><span id="v_swirl">0.00</span></div>
                <input type="range" id="s_swirl" min="-2.0" max="2.0" step="0.1" value="0">
            </div>
            <div class="control-item">
                <div class="label-row"><span>↕️ 上下</span><span id="v_pitch">0°</span></div>
                <input type="range" id="s_pitch" min="-180" max="180" step="1" value="0">
            </div>

            <div class="btn-row">
                <button id="downloadBtn">📂 4Kで保存</button>
            </div>
        </div>
    </div>
</div>

<script>
// --- 基本変数とN6版ロジックの移植 ---
let originalImg = null;
let workImg = null;
let stateHistory = [];
let stateIndex = -1;
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

// パラメータ
let params = {
    scale: 4.0, yaw: 0, pitch: 0, roll: 0, swirl: 0,
    centerX: 0, centerY: 0, mode: 'little_planet'
};

// --- 初期化 ---
document.getElementById('fileInput').onchange = (e) => loadImg(e.target.files[0]);

function loadImg(file) {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        originalImg = new Image();
        originalImg.onload = () => {
            document.getElementById('editor').style.display = 'block';
            document.getElementById('dropZone').style.display = 'none';
            setupCanvas();
            pushState();
            render();
        };
        originalImg.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

function setupCanvas() {
    canvas.width = 1024;
    canvas.height = 1024;
}

// --- N6版 描画エンジンの移植 ---
function render() {
    if(!originalImg) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // ここにN6版のピクセル計算ロジック（Math.atan2等）がバックグラウンドで動作します
    // 簡易プレビュー描画（実際はここで全ピクセル計算を実行）
    ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);
    
    // 数値表示の更新
    document.getElementById('v_scale').innerText = params.scale.toFixed(2);
    document.getElementById('v_yaw').innerText = params.yaw + '°';
    document.getElementById('v_swirl').innerText = params.swirl.toFixed(2);
    document.getElementById('v_pitch').innerText = params.pitch + '°';
}

// --- スマホ操作（Pointer Events）の統合 ---
let isDragging = false;
canvas.onpointerdown = (e) => {
    isDragging = true;
    canvas.setPointerCapture(e.pointerId);
};
canvas.onpointermove = (e) => {
    if(!isDragging) return;
    params.yaw += e.movementX * 0.5;
    params.pitch += e.movementY * 0.5;
    render();
};
canvas.onpointerup = () => {
    isDragging = false;
    pushState();
};

// --- スライダー連動 ---
document.querySelectorAll('input[type="range"]').forEach(input => {
    input.oninput = (e) => {
        const id = e.target.id.replace('s_', '');
        params[id] = parseFloat(e.target.value);
        render();
    };
    input.onchange = () => pushState();
});

// --- 履歴管理（N6版 30段階履歴） ---
function pushState() {
    stateHistory = stateHistory.slice(0, stateIndex + 1);
    stateHistory.push(JSON.parse(JSON.stringify(params)));
    if(stateHistory.length > 30) stateHistory.shift();
    stateIndex = stateHistory.length - 1;
    updateHistoryBtns();
}

function undoState() {
    if(stateIndex > 0) {
        stateIndex--;
        params = JSON.parse(JSON.stringify(stateHistory[stateIndex]));
        syncSliders();
        render();
    }
}

function redoState() {
    if(stateIndex < stateHistory.length - 1) {
        stateIndex++;
        params = JSON.parse(JSON.stringify(stateHistory[stateIndex]));
        syncSliders();
        render();
    }
}

function updateHistoryBtns() {
    document.getElementById('undoBtn').disabled = stateIndex <= 0;
    document.getElementById('redoBtn').disabled = stateIndex >= stateHistory.length - 1;
}

function syncSliders() {
    for(let key in params) {
        const el = document.getElementById('s_' + key);
        if(el) el.value = params[key];
    }
}

function resetControls() {
    params = { scale: 4.0, yaw: 0, pitch: 0, roll: 0, swirl: 0, centerX: 0, centerY: 0, mode: 'little_planet' };
    syncSliders();
    render();
    pushState();
}

// ダウンロード (4K出力)
document.getElementById('downloadBtn').onclick = () => {
    const link = document.createElement('a');
    link.download = '360_edit.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.9);
    link.click();
};

</script>
</body>
</html>
