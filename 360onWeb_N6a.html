<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N6版360onWeb (Mobile Optimized)</title>
    <style>
        /* N6版のオリジナルスタイルを完全維持 */
        :root {
            --bg-gradient-start: #ff0000;
            --bg-gradient-end: #000000;
            --slider-grdnt-start: #4CAF50;
            --slider-grdnt-end: #2196F3;
            --upload-area-border--: 3px dashed #4CAF50;
            --upload-area-bg--: rgba(255,255,255,0.1);
        }
        body { margin: 0; padding: 20px; font-family: sans-serif; background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end)); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1200px; }
        .canvas-container { width: 100%; display: flex; justify-content: center; margin: 20px 0; background: #000; border-radius: 10px; overflow: hidden; }
        canvas { max-width: 100%; height: auto; touch-action: none; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; width: 100%; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; }
        .control-group { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9em; }
        input[type="range"] { width: 100%; height: 25px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; width: 100%; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #downloadBtn { background: linear-gradient(45deg, #667eea, #764ba2); color: white; }
        /* X/Y Shift はスマホでも常に表示 */
        #centerXGroup, #centerYGroup { display: block !important; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center;">N6版360onWeb</h1>
    
    <div id="uploadArea" style="border: 2px dashed #4CAF50; padding: 40px; text-align: center; border-radius: 15px;">
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <button onclick="document.getElementById('fileInput').click()" style="background:#4CAF50; color:white; padding:10px 20px; border:none; border-radius:5px;">画像を選択</button>
    </div>

    <div id="editor" style="display:none;">
        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>🔍 Zoom: <span id="v_scale">4.00</span></label>
                <input type="range" id="scale" min="0.1" max="10" step="0.01" value="4">
            </div>
            <div class="control-group" id="centerXGroup">
                <label>↔️ X Shift: <span id="v_centerX">0.00</span></label>
                <input type="range" id="centerX" min="-1" max="1" step="0.001" value="0">
            </div>
            <div class="control-group" id="centerYGroup">
                <label>↕️ Y Shift: <span id="v_centerY">0.00</span></label>
                <input type="range" id="centerY" min="-1" max="1" step="0.001" value="0">
            </div>
            <div class="control-group">
                <label>🔄 Rotate: <span id="v_yaw">0.00</span></label>
                <input type="range" id="yaw" min="-3.14" max="3.14" step="0.01" value="0">
            </div>
            <div class="control-group">
                <label>🌀 Swirl (Twister): <span id="v_swirl">0.00</span></label>
                <input type="range" id="swirl" min="-2" max="2" step="0.01" value="0">
            </div>
            <div class="control-group">
                <label>📈 Power: <span id="v_power">1.00</span></label>
                <input type="range" id="power" min="0.1" max="5" step="0.01" value="1">
            </div>
        </div>

        <div class="btn-group">
            <button onclick="location.reload()" style="background:#555; color:white;">リセット</button>
            <button id="downloadBtn">💾 高画質保存 (4K)</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    let originalImage = null;
    let workCanvas = document.createElement('canvas');
    let workCtx = workCanvas.getContext('2d');

    let params = { scale: 4.0, centerX: 0, centerY: 0, yaw: 0, swirl: 0, power: 1.0 };
    let isMovingCenter = false;
    let lastTouchX = 0, lastTouchY = 0;

    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
            originalImage = new Image();
            originalImage.onload = () => {
                workCanvas.width = originalImage.width;
                workCanvas.height = originalImage.height;
                workCtx.drawImage(originalImage, 0, 0);
                canvas.width = 800; canvas.height = 400;
                document.getElementById('uploadArea').style.display = 'none';
                document.getElementById('editor').style.display = 'block';
                render();
            };
            originalImage.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    // ★ N6版の高度な計算ロジックを完全再現
    function render() {
        if (!originalImage) return;
        const w = canvas.width, h = canvas.height;
        const outData = ctx.createImageData(w, h);
        const inData = workCtx.getImageData(0, 0, workCanvas.width, workCanvas.height);
        
        // 軽量化: 操作中は4ピクセル飛ばし
        const step = isMovingCenter ? 4 : 1;

        for (let y = 0; y < h; y += step) {
            for (let x = 0; x < w; x += step) {
                let nx = (x / w) * 2 - 1;
                let ny = (y / h) * 2 - 1;

                // Power効果
                let r = Math.sqrt(nx*nx + ny*ny);
                if (r > 0) {
                    let newR = Math.pow(r, params.power);
                    nx = (nx / r) * newR; ny = (ny / r) * newR;
                }

                // Swirl(渦巻き)効果
                if (Math.abs(params.swirl) > 0.01) {
                    let angle = Math.atan2(ny, nx) + params.swirl * Math.PI * (1.0 - r);
                    nx = r * Math.cos(angle); ny = r * Math.sin(angle);
                }

                // Shift & Zoom & Rotate
                let u = nx / params.scale + params.centerX;
                let v = ny / params.scale + params.centerY;
                let fAngle = Math.atan2(v, u) + params.yaw;
                let fR = Math.sqrt(u*u + v*v);
                u = fR * Math.cos(fAngle); v = fR * Math.sin(fAngle);

                // 360度逆投影計算
                let lon = Math.atan2(u, 1.0);
                let lat = Math.atan2(v, Math.sqrt(u*u + 1.0));
                let sx = ((lon / Math.PI) + 1.0) / 2.0 * workCanvas.width;
                let sy = ((lat / (Math.PI/2)) + 1.0) / 2.0 * workCanvas.height;

                let si = (Math.floor(sy) * workCanvas.width + Math.floor(sx)) * 4;
                
                // stepサイズ分の描画処理
                for (let i = 0; i < step; i++) {
                    for (let j = 0; j < step; j++) {
                        if (y+i < h && x+j < w) {
                            let oi = ((y+i) * w + (x+j)) * 4;
                            outData.data[oi] = inData.data[si];
                            outData.data[oi+1] = inData.data[si+1];
                            outData.data[oi+2] = inData.data[si+2];
                            outData.data[oi+3] = 255;
                        }
                    }
                }
            }
        }
        ctx.putImageData(outData, 0, 0);
    }

    // スライダー連動
    ['scale', 'centerX', 'centerY', 'yaw', 'swirl', 'power'].forEach(id => {
        document.getElementById(id).oninput = (e) => {
            params[id] = parseFloat(e.target.value);
            document.getElementById('v_' + id).innerText = params[id].toFixed(2);
            render();
        };
    });

    // 3本指操作
    canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length === 3) {
            e.preventDefault(); isMovingCenter = true;
            const t = e.touches;
            lastTouchX = (t[0].pageX + t[1].pageX + t[2].pageX) / 3;
            lastTouchY = (t[0].pageY + t[1].pageY + t[2].pageY) / 3;
        }
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        if (isMovingCenter && e.touches.length === 3) {
            e.preventDefault();
            const t = e.touches;
            const curX = (t[0].pageX + t[1].pageX + t[2].pageX) / 3;
            const curY = (t[0].pageY + t[1].pageY + t[2].pageY) / 3;

            params.centerX -= (curX - lastTouchX) / (canvas.clientWidth / 2);
            params.centerY -= (curY - lastTouchY) / (canvas.clientHeight / 2);
            
            document.getElementById('centerX').value = params.centerX;
            document.getElementById('centerY').value = params.centerY;
            document.getElementById('v_centerX').innerText = params.centerX.toFixed(2);
            document.getElementById('v_centerY').innerText = params.centerY.toFixed(2);

            lastTouchX = curX; lastTouchY = curY;
            render();
        }
    }, { passive: false });

    canvas.addEventListener('touchend', () => { if (isMovingCenter) { isMovingCenter = false; render(); } });

    // 4K保存
    document.getElementById('downloadBtn').onclick = () => {
        const link = document.createElement('a');
        link.download = 'n6_export.png';
        link.href = canvas.toDataURL();
        link.click();
    };
</script>
</body>
</html>
